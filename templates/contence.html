{% extends "layout.html" %}
{% block content %}
<h3>Hello</h3>
<p>Let's Play Wally</p>
<div class="input-area">

  <div class="clip-score-box">
    <div class="clip-score-title">CLIP Similarity</div>
    <div id="clipScore">---</div>
  </div>

  <div class="input-fields">
    <input
      id="target"
      type="text"
      placeholder="what you want to hide"
      maxlength="50"
    >

    <input
      id="filed"
      type="text"
      placeholder="what you want to generate a lot of"
      maxlength="50"
    >

    <button id="generateButton">
      Exit
    </button>
  </div>

</div>
<div id="imageContainer"></div>
<div id="loading" class="loading-cover" style="display: none;">
  <div class="loading-content">Loading...</div>
</div>
<script>
var currentAnswerPoints = null;
var target, filed;
var loading = document.getElementById('loading');

function showLoading() {
  loading.style.display = 'block';
  loading.style.backgroundColor = 'rgba(0, 0, 0, 0.5)'; // 半透明の背景
  document.body.style.overflow = 'hidden'; // スクロールを停止
}

function fetchClipScore() {
  const targetValue = document.getElementById('target').value.trim();
  const filedValue = document.getElementById('filed').value.trim();
  const scoreElement = document.getElementById('clipScore');

  if (!targetValue || !filedValue) {
    scoreElement.textContent = '---';
    return Promise.resolve(null);
  }

  scoreElement.textContent = '計算中';

  return fetch('/clip-score', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      target: targetValue,
      filed: filedValue
    })
  })
  .then(handleResponse)
  .then(data => {
    scoreElement.textContent = data.score.toFixed(3);
    return data.score;
  })
  .catch(error => {
    console.error('CLIP Error:', error);
    scoreElement.textContent = 'エラー';
    throw error;
  });
}

document.getElementById('target').addEventListener(
  'change',
  fetchClipScore
);

document.getElementById('filed').addEventListener(
  'change',
  fetchClipScore
);

function hideLoading() {
  loading.style.display = 'none';
  document.body.style.overflow = 'auto'; // スクロールを再開
}


document.getElementById('generateButton').addEventListener('click', function() {

  target = document.getElementById('target').value.trim();
  filed = document.getElementById('filed').value.trim();

  if (!target || !filed) {
    alert('探すものと、大量生成するものを入力してください。');
    return;
  }

  showLoading();

  fetchClipScore()
    .then(() => {
      return fetch('/generate-image', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          target: target,
          filed: filed
        })
      });
    })
    .then(handleResponse)
    .then(data => {
      showImage(data.image_url);
    })
    .catch(handleError);
});

function handleResponse(response) {
  if (!response.ok) {
    return response.json().then(errorData => {
      let errorMessage = errorData.error && errorData.error.message ?
                         errorData.error.message :
                         'The network response is invalid.';
      throw new Error(errorMessage);
    });
  }
  return response.json();
}

function handleError(error) {
  console.error('Error:', error);
  alert(error.message);
  if (loading && loading.style.display === 'block') {
    hideLoading();
  }
}

function showImage(imageUrl) {
  var imageContainer = document.getElementById('imageContainer');
  imageContainer.innerHTML = '<img src="' + imageUrl + '" class="generated-image"/>';

  // 画像がロードされたら正解座標の取得リクエストを送信
  var generatedImage = document.querySelector('.generated-image');
  generatedImage.onload = function() {
    fetchAnswerPoints(imageUrl);
  };
}

function fetchAnswerPoints(imageUrl) {
  fetch('/answer', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ target: target, filed: filed, image_url: imageUrl })
  })
  .then(handleResponse)
  .then(data => {
    if (typeof data === 'string') {
      hideLoading()
      alert(data);
    } else {
      console.log(data);
      currentAnswerPoints = data;
      setupClickEvent();
      hideLoading()
    }
  })
  .catch(handleError);
}

function setupClickEvent() {
  var generatedImage = document.querySelector('.generated-image');
  generatedImage.addEventListener('click', function(event) {
    answercreate(currentAnswerPoints, event);
  });
}


  function answercreate(answerpoint, event) {
  console.log(answerpoint);
  var generatedImage = document.querySelector('.generated-image');
  var rect = generatedImage.getBoundingClientRect();
  var x = event.clientX - rect.left;
  var y = event.clientY - rect.top;
  console.log("Clicked at: x =", x, "y =", y);

  if (x >= answerpoint[0]-100 && x <= answerpoint[2]+100 && y >= answerpoint[1]-100 && y <= answerpoint[3]+100) {
    ok();
  }
}

function ok() {
  alert("You got it!  ");
  console.log('Function OK has been triggered!');
}

</script>
{% endblock %}
